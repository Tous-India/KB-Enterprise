services:
  backend:
    image: kbenterprises/servercrm:latest
    container_name: kb-backend
    env_file:
      - ./backend/.env
    restart: unless-stopped
    networks:
      - kb-network

  frontend:
    image: kbenterprises/clientcrm:latest
    container_name: kb-frontend
    restart: unless-stopped
    networks:
      - kb-network

  nginx:
    image: nginx:alpine
    container_name: kb-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt
    depends_on:
      - backend
      - frontend
    networks:
      - kb-network
    restart: unless-stopped

networks:
  kb-network:
    driver: bridge