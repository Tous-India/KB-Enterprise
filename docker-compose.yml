version: '3.8'

services:
  backend:
    image: kbenterprises/servercrm:latest
    container_name: kb-backend
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    expose:
      - "5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - MONGODB_URI=mongodb+srv://kbenterprise5230_db_user:Trythekbenterprise123@cluster0.4jryl8r.mongodb.net/kb_crm?retryWrites=true&w=majority
      - JWT_SECRET=your_jwt_secret_change_this_in_production
      - JWT_EXPIRES_IN=7d
      - CORS_ORIGIN=http://187.124.97.189,https://client-kb-crm-puce.vercel.app
      - CLOUDINARY_CLOUD_NAME=defrzunwm
      - CLOUDINARY_API_KEY=975353622344862
      - CLOUDINARY_API_SECRET=UvNfnT5Qz-8RH2yL3mFUtBJ-Nk4
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_SECURE=false
      - SMTP_USER=kbenterprise5230@gmail.com
      - SMTP_PASS=gakuhtvcwnzyurzp
      - EMAIL_FROM_NAME=KB Enterprises
      - EMAIL_FROM_ADDRESS=kbenterprise5230@gmail.com
      - EMAIL_REPLY_TO=kbenterprise5230@gmail.com
      - FRONTEND_URL=http://187.124.97.189
      - ADMIN_NOTIFICATION_EMAIL=admin@kbenterprise.org
    networks:
      - kb-network
    restart: unless-stopped

  frontend:
    image: kbenterprises/clientcrm:latest
    container_name: kb-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    expose:
      - "5173"
    environment:
      - VITE_API_BASE_URL=http://187.124.97.189/api
    depends_on:
      - backend
    networks:
      - kb-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: kb-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt
    depends_on:
      - backend
      - frontend
    networks:
      - kb-network
    restart: unless-stopped

networks:
  kb-network:
    driver: bridge























