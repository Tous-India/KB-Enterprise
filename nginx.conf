server {
    listen 80;
    server_name crm.kbenterprise.org;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name crm.kbenterprise.org;

    ssl_certificate /etc/letsencrypt/live/crm.kbenterprise.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crm.kbenterprise.org/privkey.pem;

location / {
    proxy_pass http://kb-frontend:5173;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}


    location /api {
        proxy_pass http://kb-backend:5000;
    }
}







