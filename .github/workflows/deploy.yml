# ============================================
# KB CRM - CD Pipeline
# Builds Docker images, pushes to Docker Hub,
# and deploys to Hostinger VPS
# ============================================

name: CD - Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: # Manual trigger

env:
  DOCKERHUB_USERNAME: kbenterprises
  BACKEND_IMAGE: kbenterprises/servercrm
  FRONTEND_IMAGE: kbenterprises/clientcrm

jobs:
  # ========================================
  # Build and Push Docker Images
  # ========================================
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.meta.outputs.short_sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "timestamp=$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT

      - name: Build and push backend (servercrm)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Build and push frontend (clientcrm)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend2
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ========================================
  # Deploy to Hostinger VPS
  # ========================================
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          passphrase: ""
          script_stop: true
          script: |
            set -e

            echo "=========================================="
            echo "Deploying KB CRM - $(date)"
            echo "=========================================="

            # Navigate to app directory
            # cd ~/kb-crm
            cd /home/kb-crm

            # Pull latest images from Docker Hub
            echo "Pulling latest images..."
            docker pull kbenterprises/servercrm:latest
            docker pull kbenterprises/clientcrm:latest

            # Stop and remove old containers
            echo "Stopping old containers..."
            docker-compose down || true

            # Update docker-compose.yml to use pulled images with SSL support
            cat > docker-compose.yml << 'COMPOSE'
version: '3.8'

services:
  backend:
    image: kbenterprises/servercrm:latest
    container_name: kb-backend
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    expose:
      - "5000"
    env_file:
      - ./backend/.env
    networks:
      - kb-network
    restart: unless-stopped

  frontend:
    image: kbenterprises/clientcrm:latest
    container_name: kb-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    expose:
      - "5173"
    environment:
      - VITE_API_BASE_URL=https://crm.kbenterprise.org/api
    depends_on:
      - backend
    networks:
      - kb-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: kb-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt
    depends_on:
      - backend
      - frontend
    networks:
      - kb-network
    restart: unless-stopped

networks:
  kb-network:
    driver: bridge
COMPOSE

            # Start new containers
            echo "Starting new containers..."
            docker-compose up -d

            # Wait for containers to start
            echo "Waiting for services to start..."
            sleep 20

            # Health check
            if curl -sf http://localhost:5000/api/health > /dev/null 2>&1; then
                echo "✓ Backend is healthy"
            else
                echo "⚠ Backend health check - checking container status..."
                docker-compose logs --tail=50 backend
            fi

            # Verify all containers are running
            echo "Container status:"
            docker-compose ps

            # Cleanup old images
            echo "Cleaning up old images..."
            docker image prune -f

            echo "=========================================="
            echo "Deployment completed successfully!"
            echo "=========================================="

  # ========================================
  # Notify on Failure
  # ========================================
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy]
    if: failure()

    steps:
      - name: Create failure summary
        run: |
          echo "## Deployment Failed" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** $(date)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the workflow logs for details." >> $GITHUB_STEP_SUMMARY
