# ============================================
# KB CRM - CD Pipeline
# Builds Docker images, pushes to Docker Hub,
# and deploys to VPS via SSH
# ============================================

name: CD - Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: # Manual trigger

# Cancel in-progress deployments
concurrency:
  group: deploy-production
  cancel-in-progress: false # Don't cancel ongoing deployments

env:
  DOCKERHUB_USERNAME: kbenterprises
  BACKEND_IMAGE: kbenterprises/servercrm
  FRONTEND_IMAGE: kbenterprises/clientcrm

jobs:
  # ========================================
  # Build and Push Docker Images
  # ========================================
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.meta.outputs.short_sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend2
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ========================================
  # Deploy to VPS
  # ========================================
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script_stop: true
          script: |
            set -e

            echo "=========================================="
            echo "Deploying KB CRM - $(date)"
            echo "=========================================="

            cd /home/kb-crm

            echo "Pulling images..."
            docker compose pull

            echo "Restarting containers..."
            docker compose up -d --remove-orphans

            sleep 20

            echo "Checking backend container..."
            if docker ps | grep kb-backend > /dev/null; then
                echo "✓ Backend container running"
            else
                echo "✗ Backend failed"
                docker compose logs backend
                exit 1
            fi

            docker compose ps

            docker image prune -f

            echo "=========================================="
            echo "Deployment complete!"
            echo "=========================================="

  # ========================================
  # Failure Notification
  # ========================================
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy]
    if: failure()

    steps:
      - name: Create failure summary
        run: |
          echo "## ❌ Deployment Failed" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** $(date -u)" >> $GITHUB_STEP_SUMMARY
